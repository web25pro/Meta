services:
  - type: web
    name: lpanda-backend
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lpanda-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://meta-sage-xi.vercel.app
      - key: SITE_BASE_URL
        value: https://meta-sage-xi.vercel.app
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: akpanangel26@gmail.com
      - key: BOOTSTRAP_ADMIN_PASSWORD
        value: Fadatrumpet1#
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: Angel
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: onboarding@resend.dev

databases:
  - name: lpanda-db
    plan: free
    region: frankfurt
    databaseName: lpanda
    user: lpanda
